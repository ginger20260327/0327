<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Pose Guide - 自媒體構圖助手</title>
    <!-- 引入必要的函式庫 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            margin: 0; overflow: hidden; background-color: #000; 
            font-family: -apple-system, sans-serif;
            height: 100dvh; 
        }
        .canvas-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        video { position: absolute; width: 1px; height: 1px; opacity: 0; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .mirror { transform: scaleX(-1); }
        
        .ui-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; 
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px; 
            z-index: 10; 
        }
        
        .guide-template { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 45%; height: 85%; border: 2px dashed rgba(255, 255, 255, 0.4); 
            border-radius: 120px; transition: all 0.4s ease; z-index: 5; 
        }
        .perfect-match { border: 4px solid #4ade80; background-color: rgba(74, 222, 128, 0.1); }
        
        .glass-btn {
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3); color: white; 
            padding: 12px 20px; border-radius: 999px; pointer-events: auto;
        }

        #capture-btn { 
            width: 80px; height: 80px; background: white; border-radius: 50%; 
            border: 8px solid rgba(255,255,255,0.3); pointer-events: auto;
        }
        
        .flash { animation: flashEffect 0.2s ease-out; }
        @keyframes flashEffect { 0% { background: white; } 100% { background: transparent; } }
    </style>
</head>
<body>

    <div id="flash-layer" class="fixed inset-0 pointer-events-none z-50"></div>

    <!-- 啟動按鈕 -->
    <div id="setup-box" class="fixed inset-0 bg-black z-[100] flex flex-col items-center justify-center text-white">
        <h2 class="text-2xl font-bold mb-6">AI 構圖相機</h2>
        <button id="start-btn" class="bg-white text-black px-10 py-4 rounded-full font-bold">開啟相機</button>
    </div>

    <div class="canvas-container">
        <video id="input_video" autoplay muted playsinline></video>
        <canvas id="output_canvas" class="mirror"></canvas>
        
        <div class="ui-overlay">
            <div class="flex justify-between items-start">
                <div class="bg-black/50 p-3 rounded-xl text-white backdrop-blur">
                    <p id="status-text" class="text-xs font-bold text-green-400">等待初始化</p>
                </div>
                <div class="flex flex-col gap-3">
                    <button id="switch-btn" class="glass-btn">切換鏡頭 🔄</button>
                    <button id="temp-btn" class="glass-btn">更換模板 📐</button>
                </div>
            </div>

            <div id="capture-area" class="flex justify-center pb-12">
                <button id="capture-btn"></button>
            </div>
        </div>
        <div id="guide-box" class="guide-template"></div>
    </div>

    <script>
        const video = document.getElementById('input_video');
        const canvas = document.getElementById('output_canvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status-text');
        const guide = document.getElementById('guide-box');
        const startBtn = document.getElementById('start-btn');
        const captureBtn = document.getElementById('capture-btn');
        
        let facingMode = "user";
        let isReady = false;
        let templateIdx = 0;

        const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });

        pose.onResults((results) => {
            if (!results.image) return;
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (facingMode === "user") { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

            if (results.poseLandmarks) {
                status.innerText = "✅ 已偵測人像";
                drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#fff', lineWidth: 2});
                drawLandmarks(ctx, results.poseLandmarks, {color: '#4ade80', radius: 3});
                
                // 簡易判定：鼻子位置
                const nose = results.poseLandmarks[0];
                if (nose.y > 0.1 && nose.y < 0.4) { guide.classList.add('perfect-match'); }
                else { guide.classList.remove('perfect-match'); }
            } else {
                status.innerText = "🔍 搜尋人像中";
                guide.classList.remove('perfect-match');
            }
            ctx.restore();
        });

        async function startCam() {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: facingMode, width: 1280, height: 720 }
            });
            video.srcObject = stream;
            return new Promise(resolve => video.onloadedmetadata = () => resolve());
        }

        startBtn.onclick = async () => {
            await startCam();
            document.getElementById('setup-box').style.display = 'none';
            isReady = true;
            async function predict() {
                if (isReady) await pose.send({image: video});
                requestAnimationFrame(predict);
            }
            predict();
        };

        document.getElementById('switch-btn').onclick = async () => {
            facingMode = facingMode === "user" ? "environment" : "user";
            if (facingMode === "user") canvas.classList.add('mirror');
            else canvas.classList.remove('mirror');
            await startCam();
        };

        document.getElementById('temp-btn').onclick = () => {
            templateIdx = (templateIdx + 1) % 3;
            const configs = [
                {w:'45%', h:'85%', r:'120px'},
                {w:'70%', h:'75%', r:'20px'},
                {w:'60%', h:'45%', r:'200px'}
            ];
            guide.style.width = configs[templateIdx].w;
            guide.style.height = configs[templateIdx].h;
            guide.style.borderRadius = configs[templateIdx].r;
        };

        captureBtn.onclick = () => {
            document.getElementById('flash-layer').classList.add('flash');
            setTimeout(() => document.getElementById('flash-layer').classList.remove('flash'), 200);

            // 存檔邏輯：僅擷取 Video 原始影像，不含畫布上的框線
            const offscreen = document.createElement('canvas');
            offscreen.width = video.videoWidth;
            offscreen.height = video.videoHeight;
            const oCtx = offscreen.getContext('2d');
            
            oCtx.save();
            if (facingMode === "user") { oCtx.translate(offscreen.width, 0); oCtx.scale(-1, 1); }
            oCtx.drawImage(video, 0, 0, offscreen.width, offscreen.height);
            oCtx.restore();

            const url = offscreen.toDataURL('image/jpeg', 0.9);
            const a = document.createElement('a');
            a.href = url;
            a.download = `AI_PHOTO_${Date.now()}.jpg`;
            a.click();
        };
    </script>
</body>
</html>
